<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ziyonet — Библиотека</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/animations.css" />
  </head>
  <body>
    <header class="header sticky">
      <div class="container row between center gap-md">
        <div class="brand-block">
          <h1>Ziyonet</h1>
          <p class="muted">Университетская библиотека с локальным ИИ</p>
        </div>
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="Поиск по названию, автору, ISBN, категории" />
        </div>
        <a class="btn ghost" href="admin.html">Админка</a>
      </div>
    </header>

    <main class="container grid-main">
      <section class="panel fade-in" id="catalogSection" aria-label="Каталог книг">
        <div class="section-head">
          <h2>Каталог книг</h2>
          <p class="muted">Поиск, фильтрация и быстрый просмотр</p>
        </div>
        <div class="filters-grid mt-sm">
          <select id="categoryFilter" aria-label="Категория"><option value="">Все категории</option></select>
          <input id="yearFilter" type="number" min="0" max="3000" placeholder="Год" aria-label="Год" />
          <select id="availabilityFilter" aria-label="Доступность">
            <option value="">Любая доступность</option>
            <option value="true">В наличии</option>
            <option value="false">Нет в наличии</option>
          </select>
          <select id="sortBy" aria-label="Сортировка">
            <option value="created_at">Сначала новые</option>
            <option value="title">По названию</option>
            <option value="year">По году</option>
          </select>
          <select id="orderBy" aria-label="Порядок">
            <option value="desc">По убыванию</option>
            <option value="asc">По возрастанию</option>
          </select>
        </div>
        <div id="booksGrid" class="books-grid mt-md"></div>
        <div class="row between center mt-md">
          <button id="prevPage" class="btn ghost">Назад</button>
          <span id="pageInfo">Страница 1</span>
          <button id="nextPage" class="btn ghost">Вперед</button>
        </div>
      </section>

      <section class="panel fade-in" aria-label="Чат с ИИ-ассистентом">
        <div class="section-head">
          <h2>ИИ-ассистент</h2>
          <p class="muted">Модель: qwen3.5:4b (локально через Ollama)</p>
        </div>
        <div class="row gap-sm">
          <label class="mode"><input type="radio" name="mode" value="fast" checked /> Быстрый</label>
          <label class="mode"><input type="radio" name="mode" value="deep" /> Глубокое мышление</label>
        </div>
        <select id="bookContextSelect" class="mt-sm" aria-label="Контекст книги"><option value="">Без контекста книги</option></select>
        <div id="chatMessages" class="chat-box mt-sm"></div>
        <div class="row gap-sm mt-sm">
          <textarea id="chatInput" rows="3" placeholder="Задайте вопрос..." class="grow"></textarea>
          <button id="sendBtn" class="btn primary">Отправить</button>
        </div>
      </section>
    </main>

    <div id="quickModal" class="modal hidden">
      <div class="modal-content">
        <button class="close" id="modalClose">×</button>
        <div id="modalBody"></div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
