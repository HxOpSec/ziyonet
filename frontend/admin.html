<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ziyonet — Админка</title>
    <link rel="stylesheet" href="/static/css/main.css" />
    <link rel="stylesheet" href="/static/css/components.css" />
  </head>
  <body>
    <header class="header">
      <div class="container row between center">
        <h1>Админ-панель</h1>
        <a class="btn ghost" href="/">На главную</a>
      </div>
    </header>

    <main class="container admin-layout">
      <aside class="panel">
        <h3>Навигация</h3>
        <button class="btn ghost full" data-tab="login">Вход</button>
        <button class="btn ghost full" data-tab="books">Книги</button>
        <button class="btn ghost full" data-tab="stats">Статистика</button>
        <button class="btn ghost full" id="logoutBtn">Выйти</button>
      </aside>
      <section class="panel" id="adminContent"></section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/admin.js"></script>
  </body>
</html>
